<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI日报</title>
  <style>
    :root{--paper:#f6f1e8;--ink:#211a16;--muted:#746a61;--line:#d9ccbd;--accent:#c73526;--blue:#233653;--serif:"Songti SC","SimSun",Georgia,serif;--sans:system-ui,-apple-system,"Noto Sans SC",sans-serif;--mono:"SFMono-Regular",Menlo,monospace}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(90deg,rgba(93,72,52,.035) 1px,transparent 1px),linear-gradient(180deg,#fbf8f2 0%,var(--paper) 62%,#eee5d8 100%);background-size:28px 28px,auto;color:var(--ink);font-family:var(--sans)}a{color:inherit;text-decoration:none}.site-header{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;gap:24px;align-items:center;padding:18px clamp(22px,5vw,72px);border-bottom:1px solid var(--line);background:rgba(246,241,232,.94);backdrop-filter:blur(10px)}.brand{display:flex;align-items:baseline;gap:16px}.brand-title{font-family:var(--serif);font-size:32px;font-weight:900}.brand-subtitle{color:var(--muted);font:700 13px var(--mono);letter-spacing:.32em}.nav{display:flex;gap:28px;color:#5f554d;font-weight:800}.hero,.section,.footer{width:min(1480px,calc(100% - clamp(34px,7vw,130px)));margin:0 auto}.hero{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,520px);gap:clamp(42px,7vw,100px);align-items:center;min-height:calc(100dvh - 74px);padding:70px 0}.eyebrow{display:flex;gap:14px;align-items:center;margin:0 0 22px;color:var(--accent);font:800 12px var(--mono);letter-spacing:.3em;text-transform:uppercase}.eyebrow:before{content:"";width:54px;height:1px;background:var(--accent)}.date{color:var(--muted);font:800 16px var(--mono);letter-spacing:.12em}.hero h1{margin:12px 0 0;font-family:var(--serif);font-size:clamp(46px,6vw,86px);line-height:1.05}.summary{max-width:850px;color:#5b514a;font-size:clamp(17px,1.4vw,22px);font-weight:650;line-height:1.75}.tags{display:flex;flex-wrap:wrap;gap:10px;margin:24px 0}.tag{background:#eadfce;padding:6px 11px;font-size:12px;font-weight:800}.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:52px;padding:0 24px;border:1px solid #2b211b;background:transparent;color:inherit;font:900 16px var(--sans);cursor:pointer}.btn.primary{background:#241a15;color:#fffaf2}.cover{position:relative;aspect-ratio:.8;background:linear-gradient(90deg,rgba(36,26,20,.035) 1px,transparent 1px),linear-gradient(rgba(36,26,20,.028) 1px,transparent 1px),#dedbd4;background-size:28px 28px;box-shadow:0 30px 70px rgba(54,42,32,.14);overflow:hidden}.cover:before{content:"";position:absolute;inset:0;clip-path:polygon(0 7%,70% 0,100% 0,100% 66%,0 82%);background:linear-gradient(135deg,#d88876,#be7c75 48%,#9aa0a9);opacity:.92}.cover-top,.cover-bottom{position:absolute;z-index:1;left:36px;right:36px;color:var(--blue)}.cover-top{top:36px;display:flex;justify-content:space-between;font:700 14px var(--mono);letter-spacing:.28em}.cover-mark{position:absolute;z-index:1;top:18%;right:11%;width:94px;height:94px;border:2px solid rgba(190,56,38,.7)}.cover-mark:after{content:"";position:absolute;right:18px;bottom:18px;width:66px;height:66px;background:rgba(184,91,82,.72)}.cover-bottom{bottom:40px}.cover-bottom strong{display:block;font-family:var(--serif);font-size:clamp(26px,2.5vw,38px);font-weight:500}.section{padding:64px 0}.heading{display:flex;justify-content:space-between;gap:20px;align-items:end;margin-bottom:24px}.heading h2{margin:0;font-family:var(--serif);font-size:clamp(34px,3.6vw,54px)}.search{width:min(440px,100%);border:1px solid var(--line);background:rgba(255,252,246,.75);padding:14px 16px;font:700 15px var(--sans)}.archive{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));border-top:1px solid var(--line);border-left:1px solid var(--line)}.card{min-height:230px;padding:22px;border:0;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:transparent;text-align:left;cursor:pointer}.card:hover,.card:focus{background:rgba(255,252,246,.72);outline:2px solid rgba(199,53,38,.25);outline-offset:3px}.card time{color:var(--accent);font:900 14px var(--mono)}.card h3{font-family:var(--serif);font-size:24px;line-height:1.25;margin:14px 0 10px}.card p{color:var(--muted);font-weight:560;line-height:1.65}.footer{display:flex;justify-content:space-between;padding:40px 0 52px;border-top:1px solid var(--line);color:var(--muted);font-weight:700}@media(max-width:900px){.site-header,.heading,.footer{align-items:flex-start;flex-direction:column}.hero{grid-template-columns:1fr}.archive{grid-template-columns:1fr}.nav{width:100%;overflow:auto;padding-bottom:4px}.cover{max-width:420px}.btn{width:100%}.brand{flex-wrap:wrap}.brand-subtitle{font-size:12px}}
  </style>
</head>
<body>
  <header class="site-header"><a class="brand" href="#home"><span class="brand-title">AI日报</span><span class="brand-subtitle">AI DAILY BRIEF</span></a><nav class="nav"><a href="#home">首页</a><a href="#archive">档案</a><a href="#feedback">反馈与建议</a></nav></header>
  <main id="home">
    <section class="hero"><div><p class="eyebrow" id="kicker">AI DAILY BRIEF</p><p class="date" id="date">正在读取日期</p><h1 id="title">AI 日报</h1><p class="summary" id="summary">正在读取最新日报。</p><div class="tags" id="tags"></div><div class="actions"><a class="btn primary" id="read" href="report.html">阅读完整日报 →</a><a class="btn" href="#archive">查看历史日报</a></div></div><aside class="cover"><div class="cover-top"><span id="coverDate">----</span><span id="coverIssue">№ --</span></div><div class="cover-mark"></div><div class="cover-bottom"><strong id="coverTitle">AI日报</strong></div></aside></section>
    <section id="archive" class="section"><div class="heading"><div><p class="eyebrow">ARCHIVE</p><h2>历史日报</h2></div><input id="search" class="search" type="search" placeholder="搜索日期、公司、主题或标签"></div><div class="archive" id="archiveGrid"></div></section>
    <section id="feedback" class="section"><div class="heading"><div><p class="eyebrow">SUBSCRIBE & FEEDBACK</p><h2>反馈与建议</h2><p class="summary">告诉我你希望增加的公司跟踪、行业专题、投融资动态或工具测评。</p></div><a class="btn primary" href="mailto:elainehuang129-ops@users.noreply.github.com?subject=AI日报反馈">发送邮件 →</a></div></section>
  </main><footer class="footer"><p>AI 日报用于信息整理与商业研究，不构成投资建议。</p><a href="#home">返回顶部</a></footer>
<script src="data/reports-index.js?v=20260609"></script>
<script>
const data=window.AI_DAILY_DATA||{reports:[]};
const reports=[...(data.reports||[])].sort((a,b)=>b.report_date.localeCompare(a.report_date));
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const tagHtml=tags=>(tags||[]).slice(0,7).map(t=>`<span class="tag">#${esc(t)}</span>`).join('');
const slug=r=>`${r.report_date}-${r.issue_number}`;
function renderHero(){const r=reports[0];if(!r)return;$('kicker').textContent=`AI DAILY BRIEF · 第 ${r.issue_number} 期`;$('date').textContent=r.report_date;$('title').textContent=r.title;$('summary').textContent=r.summary;$('tags').innerHTML=tagHtml(r.tags);$('read').href=`report.html#report/${slug(r)}`;$('coverDate').textContent=r.report_date;$('coverIssue').textContent=`№ ${r.issue_number}`;$('coverTitle').textContent=r.title;document.title=`AI日报｜${r.title}`}
function renderArchive(list=reports){$('archiveGrid').innerHTML=list.map(r=>`<button class="card" onclick="location.href='report.html#report/${slug(r)}'"><time>${esc(r.report_date)} · 第 ${esc(r.issue_number)} 期</time><h3>${esc(r.title)}</h3><p>${esc(r.summary)}</p><div class="tags">${tagHtml(r.tags)}</div></button>`).join('')||'<p class="summary">暂无日报。</p>'}
$('search').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();renderArchive(reports.filter(r=>[r.report_date,r.issue_number,r.title,r.summary,...(r.tags||[])].join(' ').toLowerCase().includes(q)))});
renderHero();renderArchive();
</script>
</body>
</html>
