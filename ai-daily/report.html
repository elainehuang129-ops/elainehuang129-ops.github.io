<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI日报｜完整日报</title>
  <style>
    :root {
      --paper: #f7f1e8;
      --paper-soft: #fbf8f1;
      --ink: #211a16;
      --muted: #756a61;
      --line: #ded3c5;
      --brand: #c93422;
      --navy: #18294a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--paper-soft);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.8;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 22px clamp(22px, 4vw, 70px);
      border-bottom: 1px solid var(--line);
      background: rgba(247, 241, 232, .92);
      backdrop-filter: blur(12px);
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 16px;
      text-decoration: none;
      color: var(--ink);
    }
    .brand strong {
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: clamp(26px, 2.7vw, 40px);
      letter-spacing: 0;
    }
    .brand span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .28em;
    }
    .nav {
      display: flex;
      gap: 24px;
      font-size: 15px;
      font-weight: 700;
    }
    .nav a { color: var(--muted); text-decoration: none; }
    .nav a:hover { color: var(--brand); }
    .shell {
      width: min(1120px, calc(100% - 44px));
      margin: 0 auto;
      padding: clamp(46px, 6vw, 86px) 0 70px;
    }
    .eyebrow {
      margin: 0 0 18px;
      color: var(--brand);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .42em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: clamp(38px, 6vw, 76px);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .summary {
      max-width: 850px;
      margin: 28px 0 20px;
      color: #514840;
      font-size: clamp(18px, 2vw, 24px);
      font-weight: 650;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 22px 0 50px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 12px;
      background: #efe3d4;
      color: #3d332c;
      font-size: 14px;
      font-weight: 700;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: clamp(34px, 5vw, 68px);
      align-items: start;
    }
    .items {
      border-top: 1px solid var(--line);
    }
    article {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 20px;
      padding: 34px 0;
      border-bottom: 1px solid var(--line);
    }
    .num {
      color: var(--brand);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.2;
    }
    h2 {
      margin: 0 0 14px;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: clamp(24px, 3vw, 38px);
      line-height: 1.28;
      letter-spacing: 0;
    }
    .brief {
      margin: 0 0 14px;
      color: #2f2924;
      font-size: 18px;
      font-weight: 620;
    }
    .commentary {
      margin: 0 0 18px;
      padding-left: 18px;
      border-left: 3px solid #df9a8e;
      color: #665b53;
      font-size: 16px;
      font-weight: 560;
    }
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .source {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 2px 11px;
      border: 1px solid var(--line);
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      background: rgba(255,255,255,.35);
    }
    .source:hover { color: var(--brand); border-color: #d8a196; }
    .analysis {
      position: sticky;
      top: 106px;
      padding: 24px;
      border: 1px solid var(--line);
      background: rgba(247, 241, 232, .62);
    }
    .analysis h2 {
      margin-bottom: 18px;
      font-size: 24px;
    }
    .analysis h3 {
      margin: 18px 0 6px;
      color: var(--brand);
      font-size: 13px;
      letter-spacing: .18em;
    }
    .analysis p, .analysis li {
      color: #5e534b;
      font-size: 14px;
      line-height: 1.75;
    }
    .analysis ul { margin: 8px 0 0; padding-left: 18px; }
    .empty {
      padding: 80px 0;
      color: var(--muted);
      font-size: 18px;
    }
    footer {
      padding: 34px clamp(22px, 4vw, 70px);
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    @media (max-width: 860px) {
      .topbar { align-items: flex-start; flex-direction: column; padding: 18px 22px; }
      .brand { flex-wrap: wrap; gap: 8px 14px; }
      .nav { gap: 18px; }
      .layout { grid-template-columns: 1fr; }
      .analysis { position: static; }
      article { grid-template-columns: 1fr; gap: 8px; }
      .num { font-size: 20px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="./"><strong>AI日报</strong><span>AI DAILY BRIEF</span></a>
    <nav class="nav" aria-label="主要导航">
      <a href="./">首页</a>
      <a href="./#archive">档案</a>
      <a href="./#updates">更新记录</a>
      <a href="./#feedback">反馈与建议</a>
    </nav>
  </header>

  <main class="shell">
    <p class="eyebrow" id="kicker">FULL REPORT</p>
    <h1 id="title">AI日报</h1>
    <p class="summary" id="summary"></p>
    <div class="meta" id="tags"></div>
    <div class="layout">
      <section class="items" id="items" aria-label="日报条目"></section>
      <aside class="analysis" id="analysis" aria-label="商业与战略观察"></aside>
    </div>
  </main>

  <footer>AI日报自动同步自 GitHub 数据源。公开页面会跟随每日日报数据更新。</footer>

  <script src="data/reports-index.js?v=20260609"></script>
  <script>
    const state = window.AI_DAILY_DATA || { reports: [] };
    const reports = [...(state.reports || [])].sort((a, b) => String(b.report_date).localeCompare(String(a.report_date)));
    const escapeHtml = (value) => String(value ?? '').replace(/[&<>"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
    const slugFor = (report) => `${report.report_date}-${report.issue_number}`;
    const hashSlug = decodeURIComponent((location.hash.match(/^#report\/(.+)$/) || [])[1] || '');
    const report = reports.find((entry) => slugFor(entry) === hashSlug) || reports[0];

    const title = document.getElementById('title');
    const kicker = document.getElementById('kicker');
    const summary = document.getElementById('summary');
    const tags = document.getElementById('tags');
    const items = document.getElementById('items');
    const analysis = document.getElementById('analysis');

    if (!report) {
      document.title = 'AI日报｜暂无日报';
      title.textContent = '暂无日报';
      summary.textContent = '公开站点还没有读取到日报数据。';
      items.innerHTML = '<div class="empty">请稍后刷新，或检查 data/reports-index.js 是否已同步。</div>';
      analysis.style.display = 'none';
    } else {
      document.title = `AI日报｜${report.title || report.report_date}`;
      title.textContent = report.title || `${report.report_date} AI日报`;
      kicker.textContent = `FULL REPORT · 第 ${report.issue_number || '--'} 期 · ${report.report_date || ''}`;
      summary.textContent = report.summary || '';
      tags.innerHTML = (report.tags || []).map((tag) => `<span class="tag">#${escapeHtml(tag)}</span>`).join('');
      items.innerHTML = (report.items || []).map((item, index) => {
        const number = String(item.sort_order || index + 1).padStart(2, '0');
        const sourceLinks = (item.sources || []).map((source) => {
          const name = source.source_name || '来源';
          const url = source.source_url || '#';
          return `<a class="source" href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(name)} ↗</a>`;
        }).join('');
        return `<article>
          <div class="num">${number}</div>
          <div>
            <h2>${escapeHtml(item.headline)}</h2>
            <p class="brief">${escapeHtml(item.brief)}</p>
            <p class="commentary">${escapeHtml(item.commentary)}</p>
            <div class="sources">${sourceLinks}</div>
          </div>
        </article>`;
      }).join('');

      const ba = report.business_analysis || {};
      const tracking = (ba.tracking_metrics || []).map((metric) => `<li>${escapeHtml(metric)}</li>`).join('');
      const questions = (ba.thinking_questions || []).map((question) => `<li>${escapeHtml(question)}</li>`).join('');
      analysis.innerHTML = `<h2>商业与战略观察</h2>
        <h3>今日主线</h3><p>${escapeHtml(ba.main_theme || '本期暂无商业分析。')}</p>
        <h3>市场格局</h3><p>${escapeHtml(ba.market_structure || '')}</p>
        <h3>商业化路径</h3><p>${escapeHtml(ba.commercialization || '')}</p>
        <h3>战略含义</h3><p>${escapeHtml(ba.strategic_implications || '')}</p>
        <h3>长期投资观察</h3><p>${escapeHtml(ba.long_term_investment_view || '')}</p>
        <h3>跟踪指标</h3><ul>${tracking}</ul>
        <h3>今日思考题</h3><ul>${questions}</ul>`;
    }
  </script>
</body>
</html>
